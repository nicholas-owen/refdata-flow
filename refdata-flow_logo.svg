<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 128" width="600" height="128"
     role="img" aria-label="refdata-flow — reference dataset manager">
  <title>refdata-flow</title>

  <!-- route-line mark: metro-map style -->
  <line x1="32" y1="36" x2="134" y2="36" stroke="#087f5b" stroke-width="9.5" stroke-linecap="round"/>
  <line x1="32" y1="55" x2="104" y2="55" stroke="#d9480f" stroke-width="9.5" stroke-linecap="round"/>
  <line x1="32" y1="74" x2="150" y2="74" stroke="#1c7ed6" stroke-width="9.5" stroke-linecap="round"/>
  <line x1="32" y1="93" x2="120" y2="93" stroke="#5c940d" stroke-width="9.5" stroke-linecap="round"/>
  <circle cx="134" cy="36" r="7.6" fill="#ffffff" stroke="#087f5b" stroke-width="3.6"/>
  <circle cx="150" cy="74" r="7.6" fill="#ffffff" stroke="#1c7ed6" stroke-width="3.6"/>

  <!-- wordmark -->
  <text x="184" y="74" font-family="'Segoe UI',Helvetica,Arial,sans-serif"
